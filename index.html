<style>:root{--ink:#2f2b26;--muted:#6f685e;--cream:#fbf8f2;--line:rgba(47,43,38,.16);--heart:#1a3a52;--heart-hover:#27557a;--fade:.55s;--serif:"Cormorant Garamond",Georgia,serif;--sans:"Jost",system-ui,sans-serif;}
*{box-sizing:border-box} html,body{margin:0;background:transparent} body{font-family:var(--sans);-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:8px}
.stage{position:relative;width:100%} .stage img{display:block;width:100%;height:auto}
.layer{position:absolute;inset:0;opacity:0;transition:opacity var(--fade) ease;pointer-events:none} .layer.on{opacity:1}
.pin{position:absolute;transform:translate(-50%,-50%);z-index:5}
.heart{width:22px;height:22px;padding:0;border:0;background:none;cursor:pointer;display:block;line-height:0;color:var(--heart);filter:drop-shadow(0 0 1.5px #fff) drop-shadow(0 1px 2px rgba(0,0,0,.25));transition:color .25s ease}
.heart svg{width:22px;height:22px;display:block} .heart:hover,.heart:focus-visible{color:var(--heart-hover)}
.heart:focus-visible{outline:2px solid var(--heart-hover);outline-offset:3px;border-radius:2px}
.tip{position:absolute;min-width:150px;max-width:240px;background:var(--cream);border:1px solid var(--line);border-radius:2px;padding:10px 13px 11px;box-shadow:0 10px 30px rgba(47,43,38,.16);opacity:0;visibility:hidden;transition:opacity .28s ease,visibility .28s ease;z-index:6;pointer-events:none;white-space:nowrap}
.pin.active .tip{opacity:1;visibility:visible;pointer-events:auto} .pin.active{z-index:20}
.tip .loc{display:block;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.tip .resort{display:block;font-family:var(--serif);font-style:italic;font-weight:500;font-size:20px;line-height:1.15;color:var(--ink);margin-top:3px;white-space:normal}
.tip .shop{display:inline-block;margin-top:8px;font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--heart);text-decoration:none;border-bottom:1px solid var(--heart);padding-bottom:2px}
.tip .shop:hover{color:var(--heart-hover);border-color:var(--heart-hover)}
.tip.top{bottom:calc(100% + 11px);left:50%;transform:translateX(-50%)} .tip.bottom{top:calc(100% + 11px);left:50%;transform:translateX(-50%)}
.tip.left{right:calc(100% + 12px);top:50%;transform:translateY(-50%)} .tip.right{left:calc(100% + 12px);top:50%;transform:translateY(-50%)}
@media (max-width:749px){.heart,.heart svg{width:19px;height:19px}.tip{min-width:128px}.tip .resort{font-size:17px}}
@media (prefers-reduced-motion:reduce){.layer{transition:none}}</style></head>

var stage=document.getElementById('stage');
function place(x,y){ if(x>82)return 'left'; if(y<20)return 'bottom'; if(x<14)return 'right'; return 'top'; }
var layers=[],pins=[];
CONFIG.forEach(function(d){
